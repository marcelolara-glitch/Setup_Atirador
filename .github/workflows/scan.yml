name: Setup Atirador — Scan Programado

on:
  workflow_dispatch:
    # Execução manual via GitHub UI ou via /scan e /analisar no Telegram bot.
    # O agendamento automático (a cada 30min) é feito pelo cron da Oracle Cloud VM.

concurrency:
  group: scan-logs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Restaurar estado
        run: |
          if [ -f states/atirador_state.json ]; then
            cp states/atirador_state.json /tmp/atirador_state.json
            echo "Estado restaurado."
          else
            echo "Sem estado anterior — primeira rodada."
          fi

      - name: Executar scan
        id: scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Diagnóstico pós-rodada
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_OUTCOME: ${{ steps.scan.outcome }}
        run: python diagnostics.py

      - name: Salvar log no repositório (7 dias)
        if: always()
        continue-on-error: true
        run: |
          mkdir -p logs
          for f in /tmp/atirador_logs/atirador_LOG_*.log; do
            [ -f "$f" ] && cp "$f" "logs/$(basename $f)"
          done
          find logs/ -type f -name "*.log" -mtime +7 -delete 2>/dev/null || true

          mkdir -p states
          [ -f /tmp/atirador_state.json ] && cp /tmp/atirador_state.json states/atirador_state.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ states/
          git diff --cached --quiet || git commit -m "logs: run $(date +'%Y%m%d_%H%M') [ci skip]"
          git fetch "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD
          git rebase FETCH_HEAD
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD
