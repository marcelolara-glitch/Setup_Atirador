name: Atirador Bot — Polling Telegram (legado)
# DESATIVADO: o bot agora roda como serviço systemd na Oracle Cloud VM
# (telegram_bot.py --daemon via long-polling). Mantido aqui apenas como
# fallback manual caso a VM fique offline.

on:
  workflow_dispatch:

concurrency:
  group: telegram-bot
  cancel-in-progress: false

permissions:
  contents: write
  actions: write    # necessário para /scan disparar workflow_dispatch

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar bot
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python telegram_bot.py

      - name: Salvar offset e logs do bot
        if: always()
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add states/bot_state.json logs/bot_*.log 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: offset $(date +'%Y%m%d_%H%M') [ci skip]"
          git fetch "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD
          git rebase FETCH_HEAD
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD
